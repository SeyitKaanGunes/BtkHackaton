services:
  postgres:
    image: postgres:16-alpine
    container_name: fintwin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fintwin
      POSTGRES_PASSWORD: fintwin
      POSTGRES_DB: fintwin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
