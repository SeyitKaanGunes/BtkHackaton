<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Fintwin · Mobile preview</title>
    <style>
      html, body, #root { height: 100%; margin: 0; padding: 0; background: #040A1E; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      body { display: flex; align-items: center; justify-content: center; }
      #frame {
        width: 390px;
        height: 844px;
        max-height: 100vh;
        border-radius: 36px;
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 0 0 8px #131D44, 0 0 0 9px #1C284A;
        background: #040A1E;
        position: relative;
      }
      @media (max-width: 480px) {
        #frame { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
      }
      #root { height: 100%; }
    </style>
  </head>
  <body>
    <div id="frame"><div id="root"></div></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
